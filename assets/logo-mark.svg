<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="Veta mark">
  <title>Veta mark — a seam that bends into a rising demand forecast</title>
  <desc>A single line: dim flat history on the left, a teal signal node at the inflection, then a luminous copper-to-amber line rising into the forecast.</desc>
  <defs>
    <!-- The vein: deep copper into bright amber, along the rising forecast arm -->
    <linearGradient id="veta-seam" x1="28" y1="46" x2="56" y2="12" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#B85C1E"/>
      <stop offset="0.5" stop-color="#E8923A"/>
      <stop offset="1" stop-color="#FFC777"/>
    </linearGradient>
    <filter id="veta-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- History: flat, dim, buried in the rock -->
  <path d="M8 43 L28 46" fill="none" stroke="#3A4654" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Forecast: the seam bends up and glows -->
  <g filter="url(#veta-glow)">
    <path d="M28 46 L56 12" fill="none" stroke="url(#veta-seam)" stroke-width="5.4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <path d="M28 46 L56 12" fill="none" stroke="#FFE0AE" stroke-width="1.4" stroke-linecap="round" opacity="0.85"/>

  <!-- The signal node at the inflection: where the seam stops describing the past and starts predicting -->
  <circle cx="28" cy="46" r="4.4" fill="#0B0E11"/>
  <circle cx="28" cy="46" r="3.2" fill="#3DD6C4"/>
</svg>
