<svg xmlns="http://www.w3.org/2000/svg" width="420" height="120" viewBox="0 0 420 120" role="img" aria-label="Veta — demand intelligence">
  <title>Veta logo — wordmark with the seam-forecast mark</title>
  <defs>
    <linearGradient id="vl-seam" x1="62" y1="84" x2="106" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#B85C1E"/>
      <stop offset="0.5" stop-color="#E8923A"/>
      <stop offset="1" stop-color="#FFC777"/>
    </linearGradient>
    <linearGradient id="vl-rock" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1B222B"/>
      <stop offset="1" stop-color="#0B0E11"/>
    </linearGradient>
    <linearGradient id="vl-underline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#B85C1E"/>
      <stop offset="0.55" stop-color="#E8923A"/>
      <stop offset="1" stop-color="#FFC777"/>
    </linearGradient>
    <filter id="vl-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ===== Mark: the seam-forecast, on a mineral tile ===== -->
  <g transform="translate(8,12)">
    <rect x="0" y="0" width="96" height="96" rx="20" fill="url(#vl-rock)"/>
    <rect x="0.75" y="0.75" width="94.5" height="94.5" rx="19.25" fill="none" stroke="#2A323D" stroke-width="1.25"/>

    <!-- History: flat, dim -->
    <path d="M22 66 L46 70" fill="none" stroke="#3A4654" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Forecast: glowing copper-to-amber rise -->
    <g filter="url(#vl-glow)">
      <path d="M46 70 L80 22" fill="none" stroke="url(#vl-seam)" stroke-width="7.4" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <path d="M46 70 L80 22" fill="none" stroke="#FFE0AE" stroke-width="1.8" stroke-linecap="round" opacity="0.85"/>
    <!-- Signal node at the inflection -->
    <circle cx="46" cy="70" r="6" fill="#0B0E11"/>
    <circle cx="46" cy="70" r="4.4" fill="#3DD6C4"/>
  </g>

  <!-- ===== Wordmark ===== -->
  <text x="124" y="68"
        font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif"
        font-size="54" font-weight="800" letter-spacing="2"
        fill="#F4F1EC">VETA</text>

  <!-- The seam echoes under the wordmark as the descriptor underline -->
  <line x1="125" y1="86" x2="300" y2="86" stroke="url(#vl-underline)" stroke-width="2" stroke-linecap="round"/>
  <text x="125" y="104"
        font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif"
        font-size="12.5" font-weight="600" letter-spacing="3"
        fill="#8B95A1">DEMAND INTELLIGENCE</text>
</svg>
